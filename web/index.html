<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fitness RAG Bot</title>
<style>
  :root {
    --bg: #101418;
    --panel: #1a2028;
    --panel-2: #212a34;
    --text: #e8edf2;
    --muted: #8a97a5;
    --accent: #4fa3ff;
    --user-bubble: #2b4a6f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid #2a333e;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header span { font-size: 12px; color: var(--muted); }
  #levels {
    margin-left: auto;
    display: flex;
    gap: 0;
    border: 1px solid #2f3a46;
    border-radius: 8px;
    overflow: hidden;
  }
  #levels button {
    padding: 6px 14px;
    border: none;
    border-radius: 0;
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  #levels button + button { border-left: 1px solid #2f3a46; }
  #levels button.active {
    background: var(--accent);
    color: #0b1016;
    font-weight: 600;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
    scrollbar-width: none; /* Firefox */
  }
  #chat::-webkit-scrollbar { display: none; } /* Chrome, Edge, Safari */
  .msg {
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.55;
    white-space: pre-wrap;
    overflow-wrap: break-word;
    max-width: 85%;
  }
  .user {
    background: var(--user-bubble);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .bot {
    background: var(--panel);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .bot.pending::after {
    content: "▍";
    animation: blink 1s step-start infinite;
    color: var(--accent);
  }
  @keyframes blink { 50% { opacity: 0; } }
  .sources {
    font-size: 11px;
    color: var(--muted);
    align-self: flex-start;
    max-width: 85%;
    padding: 0 16px;
    margin-top: -8px;
  }
  .error { color: #ff8a8a; }
  form {
    display: flex;
    gap: 10px;
    padding: 16px 20px 20px;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
  }
  input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid #2f3a46;
    background: var(--panel-2);
    color: var(--text);
    font-size: 15px;
    outline: none;
  }
  input:focus { border-color: var(--accent); }
  button {
    padding: 12px 22px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #0b1016;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.45; cursor: default; }
</style>
</head>
<body>
<header>
  <h1>Fitness RAG Bot</h1>
  <span>answers only from your corpus</span>
  <div id="levels" role="radiogroup" aria-label="Experience level">
    <button type="button" data-level="beginner">Beginner</button>
    <button type="button" data-level="intermediate" class="active">Intermediate</button>
    <button type="button" data-level="advanced">Advanced</button>
  </div>
</header>

<div id="chat"></div>

<form id="form">
  <input id="input" type="text" placeholder="Ask a fitness question…" autocomplete="off" autofocus />
  <button id="send" type="submit">Ask</button>
</form>

<script>
  const chat = document.getElementById("chat");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const send = document.getElementById("send");
  const levelButtons = document.querySelectorAll("#levels button");

  let level = localStorage.getItem("rag-level") || "intermediate";
  for (const button of levelButtons) {
    button.classList.toggle("active", button.dataset.level === level);
    button.addEventListener("click", () => {
      level = button.dataset.level;
      localStorage.setItem("rag-level", level);
      for (const other of levelButtons) {
        other.classList.toggle("active", other === button);
      }
      input.focus();
    });
  }

  function addMessage(className, text) {
    const div = document.createElement("div");
    div.className = "msg " + className;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    const question = input.value.trim();
    if (!question) return;

    input.value = "";
    input.disabled = true;
    send.disabled = true;

    addMessage("user", question);
    const bot = addMessage("bot pending", "");

    try {
      const response = await fetch("/api/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question, level }),
      });

      if (!response.ok) {
        throw new Error(await response.text());
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      for (;;) {
        const { done, value } = await reader.read();
        if (done) break;
        bot.textContent += decoder.decode(value, { stream: true });
        chat.scrollTop = chat.scrollHeight;
      }

      const sourcesHeader = response.headers.get("X-Sources");
      if (sourcesHeader) {
        const sources = JSON.parse(decodeURIComponent(sourcesHeader));
        const div = document.createElement("div");
        div.className = "sources";
        div.textContent = "retrieved: " + sources.join(" · ");
        chat.appendChild(div);
      }
    } catch (error) {
      bot.classList.add("error");
      bot.textContent = "Error: " + error.message;
    } finally {
      bot.classList.remove("pending");
      input.disabled = false;
      send.disabled = false;
      input.focus();
      chat.scrollTop = chat.scrollHeight;
    }
  });
</script>
</body>
</html>
